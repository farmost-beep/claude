<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#2a3f6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E07B2A"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="500" y1="0" x2="500" y2="675"/><line x1="700" y1="0" x2="700" y2="675"/>
    <line x1="900" y1="0" x2="900" y2="675"/><line x1="1100" y1="0" x2="1100" y2="675"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="none" stroke="#E07B2A" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="100" r="250" fill="none" stroke="#E07B2A" stroke-width="0.5" opacity="0.08"/>
  <circle cx="150" cy="580" r="120" fill="none" stroke="#E07B2A" stroke-width="1" opacity="0.1"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Tag -->
  <rect x="80" y="60" width="140" height="32" rx="16" fill="none" stroke="#E07B2A" stroke-width="1.5"/>
  <text x="150" y="80" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#E07B2A" text-anchor="middle">AI NATIVE STARTUP</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    AI Native Startup
  </text>
  <text x="80" y="265" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    深度解读
  </text>

  <!-- Subtitle -->
  <text x="80" y="325" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#94a3b8">
    创始人从"干活的人"变成"设计系统的人"
  </text>

  <!-- Decorative line -->
  <rect x="80" y="355" width="60" height="3" fill="#E07B2A" rx="1.5"/>

  <!-- Info cards row -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="240" height="70" rx="8" fill="url(#card)" stroke="#2a3f6e" stroke-width="0.5"/>
    <text x="20" y="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#94a3b8">核心框架</text>
    <text x="20" y="52" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Idea → MVP → Launch → Scale</text>

    <rect x="260" y="0" width="240" height="70" rx="8" fill="url(#card)" stroke="#2a3f6e" stroke-width="0.5"/>
    <text x="280" y="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#94a3b8">关键洞察</text>
    <text x="280" y="52" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" fill="#ffffff">6个前沿案例 + 3工具矩阵</text>

    <rect x="520" y="0" width="240" height="70" rx="8" fill="url(#card)" stroke="#2a3f6e" stroke-width="0.5"/>
    <text x="540" y="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#94a3b8">作者洞察</text>
    <text x="540" y="52" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" fill="#ffffff">基于 Anthropic 创始人手册</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="671" width="1200" height="4" fill="url(#accent)"/>

  <!-- Source -->
  <text x="80" y="630" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#475569">
    Anthropic《The Founder's Playbook: Building an AI-Native Startup》· 2026
  </text>
</svg>
