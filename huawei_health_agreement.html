<h1>用户协议与隐私声明</h1>
<p><strong>服务说明：</strong>本应用为个人健康数据管理工具，用于读取华为运动健康服务中的健康数据（步数、心率、睡眠、血氧），仅限本人使用。</p>
<p><strong>数据收集与使用：</strong>仅读取用户明确授权的健康数据，仅存储于用户本地设备，不上传第三方服务器，不用于商业目的。</p>
<p><strong>数据安全：</strong>使用OAuth 2.0加密传输，Token定期刷新，可随时撤销授权。</p>
<p><strong>用户权利：</strong>可随时在华为健康App中撤销授权，可要求删除已存储数据。</p>
<p><strong>免责声明：</strong>本应用为个人项目，按"现状"提供。</p>
<p><strong>联系方式：</strong>通过 GitHub Issues 联系。</p>
